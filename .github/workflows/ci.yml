name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Lean Install (High Stability)
        run: |
          python -m pip install --upgrade pip
          echo "--- Memory before install ---"
          free -h
          
          # تثبيت المكتبات الأساسية من pyproject.toml بنسخ جاهزة
          pip install -e . --no-cache-dir --only-binary=:all:
          
          # تثبيت pytest بشكل مستقر وبسيط
          pip install --no-cache-dir pytest
          
          echo "--- Memory after install ---"
          free -h

      - name: Run tests
        run: |
          echo "--- Memory before tests ---"
          free -h
          
          # تشغيل pytest العادي (بدون -n لضمان التوافق)
          python -m pytest tests -v
          
          echo "--- Memory after tests ---"
          free -h

      - name: Validate schemas
        run: |
          if [[ -f config/config.json && -f schemas/config.schema.json ]]; then
            python -m l10n_audit.core.schema_validation --input config/config.json --schema schemas/config.schema.json
          else
            echo "Schema files missing, skipping validation"
          fi