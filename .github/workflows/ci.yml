name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-optional.txt

      - name: Run tests
        run: python -m pytest tests

      - name: Validate schemas
        run: |
          python -m core.schema_validation --input config/config.json --schema schemas/config.schema.json
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          terminology_dir = Path("docs/terminology")
          glossary = terminology_dir / "glossary.json"
          if not glossary.exists():
              candidates = sorted(path for path in terminology_dir.glob("*.json") if path.is_file())
              if not candidates:
                  raise SystemExit("No glossary JSON file found under docs/terminology")
              glossary = candidates[0]

          subprocess.run(
              [sys.executable, "-m", "core.schema_validation", "--input", str(glossary), "--schema", "schemas/glossary.schema.json"],
              check=True,
          )
          PY
