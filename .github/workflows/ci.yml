name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          # الكاش يعتمد فقط على pyproject و dev لأننا استغنينا عن التثبيت المكرر لـ requirements.txt
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Lean Install (High Stability)
        run: |
          python -m pip install --upgrade pip
          
          echo "--- Memory before install ---"
          free -h
          
          # 1. التثبيت بوضع المطور: يقرأ pyproject.toml ويثبت كل التبعيات الأساسية مرة واحدة
          # استخدمنا --only-binary لضمان عدم استهلاك الذاكرة في بناء الحزم من المصدر
          pip install -e . --no-cache-dir --only-binary=:all:

          # 2. تثبيت أدوات الاختبار (pytest) فقط لضمان بيئة اختبار خفيفة
          if [ -f requirements-dev.txt ]; then 
            pip install --no-cache-dir --only-binary=:all: -r requirements-dev.txt
          else
            pip install --no-cache-dir pytest pytest-xdist
          fi
          
          echo "--- Memory after install ---"
          free -h

      - name: Run tests
        run: |
          echo "--- Memory before tests ---"
          free -h
          # تشغيل الاختبارات بالتسلسل (-n 0) لمنع انفجار الذاكرة RAM
          python -m pytest tests -v -n 0
          echo "--- Memory after tests ---"
          free -h

      - name: Validate schemas
        run: |
          if [[ -f config/config.json && -f schemas/config.schema.json ]]; then
            python -m l10n_audit.core.schema_validation --input config/config.json --schema schemas/config.schema.json
          else
            echo "Schema files missing, skipping validation"
          fi