name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          # المسار الدقيق لضمان كفاءة الكاش وتجنب تضخم الذاكرة
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          # تثبيت الاختياري فقط إذا لزم الأمر (معطل حالياً لتوفير الذاكرة)
          # if [ -f requirements-optional.txt ]; then pip install -r requirements-optional.txt; fi

      - name: Run tests
        # فرض تشغيل الاختبارات في عملية واحدة (Process) لتقليل ضغط RAM
        run: python -m pytest tests -v -n 0

      - name: Validate schemas
        run: |
          if [[ -f config/config.json && -f schemas/config.schema.json ]]; then
            python -m l10n_audit.core.schema_validation --input config/config.json --schema schemas/config.schema.json
          else
            echo "Schema files missing, skipping validation"
          fi